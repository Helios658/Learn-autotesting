stages:
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  CI: "true"
  TEST_BASE_URL: "https://gamma.hi-tech.org"
  HEADLESS_MODE: "true"
  TEST_USER_EMAIL: "v.kornienko@iva.ru"

cache:
  paths:
    - .cache/pip

full_e2e_tests:
  stage: test
  image: mcr.microsoft.com/playwright/python:v1.55.0-jammy
  tags:
    - docker_last
  before_script:
    # ... (всё как у вас)
  script:
    - pytest -v --headless --junitxml=report.xml --alluredir=allure-results
    - |
      if [ -n "${ALLURE_ENDPOINT}" ] && [ -n "${ALLURE_TOKEN}" ] && [ -n "${ALLURE_PROJECT_ID}" ]; then
        curl -sSL https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 -o /usr/local/bin/allurectl
        chmod +x /usr/local/bin/allurectl
        allurectl watch --project-id "${ALLURE_PROJECT_ID}" allure-results
      else
        echo "ALLURE_ENDPOINT/ALLURE_TOKEN/ALLURE_PROJECT_ID not set -> skip Allure TestOps upload"
      fi
  after_script:
    - echo "Tests finished"
    - |
      # Проверяем, что нужные файлы существуют
      if [ -f "report.xml" ]; then
        echo "✅ report.xml found"
      else
        echo "⚠️ report.xml not found"
      fi
    - |
      # Явно завершаем с успехом
      exit 0
  artifacts:
    when: always
    reports:
      junit: report.xml
    paths:
      - report.xml
      - allure-results/
      - last_generated_password.txt