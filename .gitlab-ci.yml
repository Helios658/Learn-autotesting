stages:
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  CI: "true"
  TEST_BASE_URL: "https://gamma.hi-tech.org"
  HEADLESS_MODE: "true"
  TEST_USER_EMAIL: "v.kornienko@iva.ru"

cache:
  paths:
    - .cache/pip

full_e2e_tests:
  stage: test
  image: mcr.microsoft.com/playwright/python:v1.55.0-jammy
  tags:
    - docker_last
  before_script:
    - pip install -r requirements.txt
    - python -m pip install --upgrade "playwright==1.55.0"
    - rm -rf allure-results
    - mkdir -p allure-results
    - |
      cat > allure-results/environment.properties <<EOF
      ENV=CI
      BASE_URL=${TEST_BASE_URL}
      HEADLESS=${HEADLESS_MODE}
      BROWSER=chromium
      EOF
    - |
      cat > allure-results/executor.json <<EOF
      {
        "name": "GitLab CI",
        "type": "gitlab",
        "url": "${CI_PROJECT_URL}",
        "buildOrder": "${CI_PIPELINE_ID}",
        "buildName": "${CI_JOB_NAME}",
        "buildUrl": "${CI_PIPELINE_URL}",
        "reportName": "UI E2E"
      }
      EOF
    - export TEST_USER_PASSWORD="${TEST_USER_PASSWORD}"
    - echo "${TEST_USER_PASSWORD}" > last_generated_password.txt
  script:
    - |
      TEST_EXIT=0

      if [ -n "${ALLURE_ENDPOINT}" ] && [ -n "${ALLURE_TOKEN}" ] && [ -n "${ALLURE_PROJECT_ID}" ]; then
        curl -sSL https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 -o /usr/local/bin/allurectl
        chmod +x /usr/local/bin/allurectl

        export ALLURE_RESULTS=allure-results
        # Просим TestOps закрывать launch сразу после завершения job-run.
        export ALLURE_LAUNCH_AUTO_CLOSE=true

        set -o pipefail
        allurectl watch -- pytest -v --headless --junitxml=report.xml --alluredir=allure-results 2>&1 | tee allure_watch.log
        TEST_EXIT=${PIPESTATUS[0]}

        # Fallback: если Launch не закрылся автоматически, пробуем закрыть его явно.
        # В разных версиях allurectl синтаксис отличается — пробуем несколько вариантов.
        LAUNCH_ID=$(sed -n 's/.*Launch \[\([0-9]\+\)\].*/\1/p' allure_watch.log | tail -n1)
        if [ -n "${LAUNCH_ID}" ]; then
          echo "Detected Launch ID: ${LAUNCH_ID}"
        fi

        if [ -n "${LAUNCH_ID}" ]; then
          allurectl launch close "${LAUNCH_ID}" || true
        else
          echo "Launch ID is empty, skip explicit close"
        fi
      else
        echo "ALLURE_ENDPOINT/ALLURE_TOKEN/ALLURE_PROJECT_ID not set -> run pytest without TestOps upload"
        pytest -v --headless --junitxml=report.xml --alluredir=allure-results || TEST_EXIT=$?
      fi

      exit $TEST_EXIT
  after_script:
    - echo "Tests finished"
  artifacts:
    when: always
    reports:
      junit: report.xml
    paths:
      - report.xml
      - allure-results/
      - last_generated_password.txt
      - artifacts/